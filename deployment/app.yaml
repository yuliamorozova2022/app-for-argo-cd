apiVersion: apps/v1
kind: Deployment
metadata:
  name: wil-app
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wil-app
  template:
    metadata:
      labels:
        app: wil-app
    spec:
      containers:
      - name: wil-app-container
        # THIS IS VERSION v1. 
        # It has to be changed from 1.10 to  1.10.1 in GitHub
        image: paulbouwer/hello-kubernetes:1.10
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: wil-app-service
  namespace: dev
spec:
  selector:
    app: wil-app
  ports:
    - protocol: TCP
      port: 80         # Port that Ingress or user will access
      targetPort: 8080 # Port inside the container